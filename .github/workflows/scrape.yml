name: F1 Data Scraper

on:
  push:
    branches:
      - main
    paths:
      - 'data/drivers_config_2026.json'
      - 'data/teams_config_2026.json'
      - 'scraper_drivers.py'
      - 'scraper_teams.py'
      - '.github/workflows/scrape.yml'
  schedule:
    # 每 3 小时执行一次，由 Python 脚本内部判断是否到达赛后 3 小时的触发窗口
    - cron: '15 */3 * * *'
  workflow_dispatch:
    inputs:
      force_results:
        description: 'Force scrape race results'
        required: false
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Schedule Scraper (One-time info)
        if: github.event_name != 'schedule'
        run: python scraper.py

      - name: Checkout F1 Website (for DB access)
        uses: actions/checkout@v4
        with:
          repository: crashdada/f1-website
          path: f1-website
          token: ${{ secrets.GH_PAT }}

      - name: Run Drivers & Teams Scraper (One-time info)
        if: github.event_name != 'schedule'
        run: |
          python scraper_drivers.py
          python scraper_teams.py

      - name: Refine with Historical Stats
        if: github.event_name != 'schedule'
        env:
          F1_DB_PATH: f1-website/public/data/f1.db
        run: |
          python refine_with_stats.py

      - name: Run Results Scraper (Periodic check)
        # 始终运行以支持 push 测试，但在 schedule 模式下由脚本内部判断是否在赛后窗口
        run: |
          python scraper_results.py || echo "Not in race window or failed, skipping."
          python export_results_json.py || echo "Failed to generate JSON results."

      - name: Update F1-Website CSV and DB (Muted for 2026)
        # 仅在有新结果时可能触发，但目前处于 Muted 状态
        if: github.event.inputs.force_results == 'true' || github.event_name == 'schedule'
        env:
          F1_WEBSITE_DIR: f1-website
        run: |
          echo 'DB update is muted for the running season.'

      - name: Commit and Push changes to collector
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/*.json results_*/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit for collector"
          else
            git commit -m "Auto-update F1 data $(date -u +'%Y-%m-%d') [skip ci]"
            git push https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git HEAD:main
          fi

      - name: Commit and Push changes to website (JSON only)
        # 只有在 schedule 或手动强制时才把 JSON 同步回 website 的 data 目录（如果需要）
        # 注意：此处 push 回 website 会触发 website 的构建流程
        if: github.event_name == 'schedule' || github.event.inputs.force_results == 'true'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          cd f1-website
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          # 将 collector 生成的最新的 JSON 同步到 website 的 public/data/
          cp ../data/*.json public/data/
          git add public/data/*.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit for website"
          else
            git commit -m "Auto-update F1 JSON data $(date -u +'%Y-%m-%d') [skip ci]"
            git push https://x-access-token:${GH_PAT}@github.com/crashdada/f1-website.git HEAD:main
          fi
